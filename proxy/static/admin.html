<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dodoco</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#1a1a2e',
            card: '#16213e',
            accent: '#0f3460',
            highlight: '#e94560',
          }
        }
      }
    }
  </script>
</head>

<body class="dark bg-surface min-h-screen text-gray-200">

  <div x-data="adminApp()" x-init="init()" class="max-w-4xl mx-auto px-4 py-8">

    <!-- Toast -->
    <div x-show="toast.show" x-transition
      class="fixed top-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg text-sm font-medium"
      :class="toast.error ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white'">
      <span x-text="toast.message"></span>
    </div>

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-white tracking-tight">dodoco</h1>
      <p class="text-gray-400 mt-1">rule management</p>
    </div>

    <!-- Rules Table -->
    <div class="bg-card rounded-xl border border-gray-700/50 overflow-hidden">
      <div class="px-5 py-4 border-b border-gray-700/50 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-white">Rules</h2>
        <span class="text-xs text-gray-500" x-text="rules.length + ' rule(s)'"></span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-gray-400 text-left text-xs uppercase tracking-wider border-b border-gray-700/50">
              <th class="px-5 py-3">Host Rule</th>
              <th class="px-5 py-3">Target</th>
              <th class="px-5 py-3">Modifications</th>
              <th class="px-5 py-3 w-20">Enabled</th>
              <th class="px-5 py-3 w-20">Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(rule, index) in rules" :key="index">
              <tr class="border-b border-gray-700/30 hover:bg-accent/20 transition-colors">
                <td class="px-5 py-3 font-mono text-sm text-gray-200" x-text="rule.host"></td>
                <td class="px-5 py-3">
                  <div class="text-xs text-gray-400" x-show="rule.targetInterface">IF: <span class="text-gray-200" x-text="rule.targetInterface"></span></div>
                  <div class="text-xs text-gray-400" x-show="rule.targetDNS">DNS: <span class="text-gray-200" x-text="rule.targetDNS"></span></div>
                  <div class="text-xs text-gray-500 italic" x-show="!rule.targetInterface && !rule.targetDNS">Default</div>
                </td>
                <td class="px-5 py-3">
                  <template x-for="(mod, mIndex) in rule.modifyResponse" :key="mIndex">
                    <div class="text-xs flex items-center gap-2 mb-1 group">
                      <span class="px-1.5 py-0.5 rounded bg-highlight/20 text-highlight font-mono text-[10px]" x-text="mod.isRegex ? 'RE' : 'ST'"></span>
                      <span class="text-gray-400 truncate max-w-[100px]" x-text="mod.search" :title="mod.search"></span>
                      <span class="text-gray-600">→</span>
                      <span class="text-gray-300 truncate max-w-[100px]" x-text="mod.replace" :title="mod.replace"></span>
                      <button @click="rule.modifyResponse.splice(mIndex, 1)" class="opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400 transition-opacity text-sm">
                        Delete
                      </button>
                    </div>
                  </template>
                  <div class="text-xs text-gray-600 italic" x-show="!rule.modifyResponse || rule.modifyResponse.length === 0">None</div>
                </td>
                <td class="px-5 py-3">
                  <button @click="rule.enabled = !rule.enabled"
                    class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors"
                    :class="rule.enabled ? 'bg-emerald-500' : 'bg-gray-600'">
                    <span class="inline-block h-3.5 w-3.5 rounded-full bg-white transition-transform"
                      :class="rule.enabled ? 'translate-x-4' : 'translate-x-1'"></span>
                  </button>
                </td>
                <td class="px-5 py-3 flex items-center gap-3">
                  <button @click="editRule(index)"
                    class="text-highlight hover:text-highlight/80 transition-colors text-xs font-medium">
                    Edit
                  </button>
                  <button @click="removeRule(index)"
                    class="text-red-400 hover:text-red-300 transition-colors text-xs font-medium">
                    Delete
                  </button>
                </td>
              </tr>
            </template>
            <tr x-show="rules.length === 0">
              <td colspan="5" class="px-5 py-6 text-center text-gray-500 italic">No rules configured</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Add/Edit Rule Form -->
    <div class="mt-6 bg-card rounded-xl border border-gray-700/50 p-5" id="rule-form">
      <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4" x-text="editingIndex === null ? 'Add Rule' : 'Edit Rule'">Add Rule</h3>
      <div class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div>
            <label class="block text-xs text-gray-500 mb-1">Host Rule</label>
            <input type="text" x-model="newRule.host" placeholder="*.example.com"
              class="w-full bg-surface border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-highlight focus:ring-1 focus:ring-highlight">
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Target Interface</label>
            <input type="text" x-model="newRule.targetInterface" list="iface-list" placeholder="tun0"
              class="w-full bg-surface border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-highlight focus:ring-1 focus:ring-highlight">
            <datalist id="iface-list">
              <template x-for="iface in interfaces" :key="iface.name">
                <option :value="iface.name" x-text="iface.name + ' (' + iface.addresses.join(', ') + ')'"></option>
              </template>
            </datalist>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Target DNS</label>
            <input type="text" x-model="newRule.targetDNS" placeholder="1.1.1.1 (optional)"
              class="w-full bg-surface border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-highlight focus:ring-1 focus:ring-highlight">
          </div>
        </div>

        <div class="pt-2">
          <div class="flex items-center justify-between mb-2">
            <label class="block text-xs text-gray-500">Response Modifications</label>
            <button x-show="newRule.modifyResponse.length > 0" @click="newRule.modifyResponse = []" class="text-[10px] text-gray-500 hover:text-red-400 transition-colors uppercase font-semibold tracking-wider">Clear All</button>
          </div>
          <div class="space-y-2 mb-3">
            <template x-for="(mod, index) in newRule.modifyResponse" :key="index">
              <div class="flex items-center gap-2 bg-surface/50 p-2 rounded-lg border border-gray-700/50">
                <span class="text-[10px] font-mono px-1.5 py-0.5 rounded" :class="mod.isRegex ? 'bg-highlight/20 text-highlight' : 'bg-gray-700 text-gray-300'" x-text="mod.isRegex ? 'REGEX' : 'STR'"></span>
                <span class="text-sm text-gray-300 flex-1 truncate" x-text="mod.search"></span>
                <span class="text-gray-600">→</span>
                <span class="text-sm text-gray-400 flex-1 truncate" x-text="mod.replace"></span>
                <button @click="newRule.modifyResponse.splice(index, 1)" class="text-gray-500 hover:text-red-400 text-sm">
                  Delete
                </button>
              </div>
            </template>
          </div>
          
          <div class="grid grid-cols-1 sm:grid-cols-12 gap-2 items-end">
            <div class="sm:col-span-4">
              <input type="text" x-model="newMod.search" placeholder="Search (e.g. (Hello) World)" class="w-full bg-surface border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-highlight">
            </div>
            <div class="sm:col-span-4">
              <input type="text" x-model="newMod.replace" placeholder="Replace (e.g. $1 Universe)" class="w-full bg-surface border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-gray-200 focus:outline-none focus:border-highlight">
            </div>
            <div class="sm:col-span-2 flex items-center justify-center py-1.5">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" x-model="newMod.isRegex" class="rounded border-gray-700 bg-surface text-highlight focus:ring-highlight">
                <span class="text-xs text-gray-500">Regex</span>
              </label>
            </div>
            <div class="sm:col-span-2 flex gap-1">
              <button @click="addMod()" :disabled="!newMod.search" class="flex-1 py-1.5 bg-accent hover:bg-accent/80 text-white text-xs font-medium rounded-lg disabled:opacity-50 transition-colors">Add</button>
            </div>
          </div>
          <div class="mt-2 flex flex-wrap gap-x-6 gap-y-2">
            <div class="text-[10px] text-gray-500 flex items-center gap-1.5">
              <span class="px-1 bg-highlight/10 text-highlight rounded font-bold">REGEX</span>
              <span><code class="text-gray-400">google\.com</code> → <code class="text-gray-300">bing.com</code></span>
            </div>
            <div class="text-[10px] text-gray-500 flex items-center gap-1.5">
              <span class="px-1 bg-highlight/10 text-highlight rounded font-bold">GROUPS</span>
              <span><code class="text-gray-400">(Hello) (\w+)</code> → <code class="text-gray-300">$1 $2!</code></span>
            </div>
          </div>
        </div>
      </div>
      
      <div class="mt-6 flex gap-3">
        <button @click="saveRule()" :disabled="!newRule.host.trim()"
          class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
          x-text="editingIndex === null ? 'Add Rule' : 'Update Rule'">
          Add Rule
        </button>
        <button x-show="editingIndex !== null" @click="cancelEdit()"
          class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white text-sm font-medium rounded-lg transition-colors">
          Cancel
        </button>
      </div>
    </div>

    <!-- Save Button -->
    <div class="mt-6 flex justify-end">
      <button @click="saveRules()" :disabled="saving"
        class="px-6 py-2.5 bg-highlight hover:bg-highlight/80 text-white text-sm font-semibold rounded-lg transition-colors disabled:opacity-50">
        <span x-show="!saving">Save to Server</span>
        <span x-show="saving">Saving…</span>
      </button>
    </div>

  </div>

  <script>
    function adminApp() {
      return {
        rules: [],
        interfaces: [],
        newRule: { host: '', targetInterface: '', targetDNS: '', modifyResponse: [] },
        newMod: { search: '', replace: '', isRegex: false },
        editingIndex: null,
        saving: false,
        toast: { show: false, message: '', error: false },

        async init() {
          await Promise.all([this.loadRules(), this.loadInterfaces()]);
        },

        async loadRules() {
          try {
            const resp = await fetch('/api/rules');
            const data = await resp.json();
            this.rules = Object.entries(data.rules || {}).map(([host, target]) => ({
              host,
              targetInterface: target.targetInterface || '',
              targetDNS: target.targetDNS || '',
              modifyResponse: target.modifyResponse || [],
              enabled: target.enabled !== false,
            }));
          } catch (e) {
            this.showToast('Failed to load rules: ' + e.message, true);
          }
        },

        async loadInterfaces() {
          try {
            const resp = await fetch('/api/interfaces');
            this.interfaces = await resp.json();
          } catch (e) {
            console.error('Failed to load interfaces:', e);
          }
        },

        addMod() {
          if (!this.newMod.search) return;
          this.newRule.modifyResponse.push({ ...this.newMod });
          this.newMod = { search: '', replace: '', isRegex: false };
        },

        editRule(index) {
          this.editingIndex = index;
          const rule = this.rules[index];
          this.newRule = {
            host: rule.host,
            targetInterface: rule.targetInterface,
            targetDNS: rule.targetDNS,
            modifyResponse: JSON.parse(JSON.stringify(rule.modifyResponse)), // deep copy
          };
          document.getElementById('rule-form').scrollIntoView({ behavior: 'smooth' });
        },

        cancelEdit() {
          this.editingIndex = null;
          this.newRule = { host: '', targetInterface: '', targetDNS: '', modifyResponse: [] };
        },

        saveRule() {
          const host = this.newRule.host.trim();
          if (!host) return;

          const ruleData = {
            host,
            targetInterface: this.newRule.targetInterface.trim(),
            targetDNS: this.newRule.targetDNS.trim(),
            modifyResponse: [...this.newRule.modifyResponse],
            enabled: this.editingIndex !== null ? this.rules[this.editingIndex].enabled : true,
          };

          if (this.editingIndex !== null) {
            this.rules[this.editingIndex] = ruleData;
          } else {
            this.rules.push(ruleData);
          }

          this.cancelEdit();
        },

        removeRule(index) {
          if (this.editingIndex === index) {
            this.cancelEdit();
          }
          this.rules.splice(index, 1);
        },

        async saveRules() {
          this.saving = true;
          try {
            const rulesObj = {};
            for (const rule of this.rules) {
              const target = {};
              if (rule.targetInterface) target.targetInterface = rule.targetInterface;
              if (rule.targetDNS) target.targetDNS = rule.targetDNS;
              if (rule.modifyResponse && rule.modifyResponse.length > 0) {
                target.modifyResponse = rule.modifyResponse;
              }
              target.enabled = rule.enabled;
              rulesObj[rule.host] = target;
            }

            const resp = await fetch('/api/rules', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ rules: rulesObj }),
            });

            if (!resp.ok) {
              const text = await resp.text();
              throw new Error(text);
            }
            this.showToast('Rules saved successfully', false);
          } catch (e) {
            this.showToast('Failed to save: ' + e.message, true);
          } finally {
            this.saving = false;
          }
        },

        showToast(message, error) {
          this.toast = { show: true, message, error };
          setTimeout(() => { this.toast.show = false; }, 3000);
        },
      };
    }
  </script>
</body>

</html>
